# Dependabot: automated dependency-update PRs.
# https://docs.github.com/code-security/dependabot/dependabot-version-updates
#
# NOTE: this file only enables *version updates* (scheduled PRs). The security
# side — Dependabot alerts + automatic security-fix PRs against the CVE/GHSA
# database — is a repo Settings > Code security toggle (free), not config here.
version: 2
updates:
  # Python deps — uv-managed (pyproject.toml + uv.lock). The "uv" ecosystem is
  # supported since 2025-03; this repo's deps carry >= constraints, so lockfile
  # updates work (fully unconstrained deps are the known no-op case).
  - package-ecosystem: "uv"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "deps"
    groups:
      # Batch minor+patch bumps into one PR to cut noise; majors stay
      # individual so each breaking change gets its own review.
      python-minor-patch:
        update-types: ["minor", "patch"]

  # Keep GitHub Actions (checkout, setup-uv, codeql-action) patched —
  # a pinned-but-stale action is a real supply-chain surface.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "ci"
    groups:
      github-actions:
        update-types: ["minor", "patch"]
