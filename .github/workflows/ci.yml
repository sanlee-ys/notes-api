name: CI

on:
  push:
    branches: ["main", "claude/*"]
  pull_request:
    branches: ["main"]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: astral-sh/setup-uv@v7
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install 3.11

      - name: Install dependencies
        run: uv sync --group dev

      - name: Lint
        run: uv run ruff check src/ tests/

      - name: Format check
        run: uv run black --check src/ tests/

      - name: Type check
        run: uv run mypy src/

      # notes-api is the SECOND consumer on the SYS-004 /classify seam. This is
      # the only check here that looks OUTWARD — everything else asserts this
      # code against fixtures this repo controls, which is why the provider
      # adding `region` went unnoticed for a day while CI stayed green.
      # Divergence fails; a fetch failure warns and passes (SYS-018).
      - name: Contract matches the provider (SYS-018)
        run: uv run python scripts/check_classify_contract.py

      - name: Test
        run: uv run pytest --cov=notes_api --cov-report=term-missing
