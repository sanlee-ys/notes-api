# Local dev stack for notes-api Phase 0 (event-driven work).
# Single-node Kafka in KRaft mode (no ZooKeeper) + kafka-ui to watch topics/messages.
#
# Bring up:   docker compose -f local/docker-compose.yml up -d
# kafka-ui:   http://localhost:8080   (cluster "local")
# App config: bootstrap server = localhost:9092
# Tear down:  docker compose -f local/docker-compose.yml down
#
# NOTE: using confluentinc/cp-kafka, not apache/kafka. The apache image's KRaft
# auto-format step (StorageTool) rejects custom dual advertised listeners as
# "0.0.0.0" even when advertised.listeners is set correctly. Confluent's image
# formats cleanly with the identical listener config.

services:
  kafka:
    image: confluentinc/cp-kafka:7.8.0
    container_name: notes-kafka
    ports:
      - "9092:9092"                      # HOST listener -> reachable from the Windows-side Spring app on localhost
    environment:
      CLUSTER_ID: "5L6g3nShT-eMCtK--X86sw"   # any valid 22-char base64 KRaft cluster id
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@localhost:9093
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      # Two PLAINTEXT listeners on purpose:
      #   HOST     (9092)  advertised as localhost:9092 -> app on the Windows host
      #   INTERNAL (29092) advertised as kafka:29092    -> kafka-ui inside the docker network
      KAFKA_LISTENERS: HOST://0.0.0.0:9092,INTERNAL://0.0.0.0:29092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: HOST://localhost:9092,INTERNAL://kafka:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: HOST:PLAINTEXT,INTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      # single-node => every replication factor is 1
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics --bootstrap-server localhost:9092 --list || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 12
      start_period: 20s

  kafka-ui:
    image: provectuslabs/kafka-ui:v0.7.2   # web UI to see topics/messages (kafbat/kafka-ui is the newer maintained fork)
    container_name: notes-kafka-ui
    ports:
      - "8080:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092   # reach the broker over the docker network
      DYNAMIC_CONFIG_ENABLED: "true"
    depends_on:
      kafka:
        condition: service_healthy
