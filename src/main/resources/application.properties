spring.application.name=notes-api

# Default profile: H2 in-memory (zero setup, used by tests and quick runs).
# Flyway is OFF here because the migrations are PostgreSQL-specific; Hibernate
# builds the H2 schema from the entities instead. The 'postgres' profile
# (application-postgres.properties) switches to a real database with Flyway.
spring.flyway.enabled=false

# Run on 8081 for local dev so the app doesn't collide with kafka-ui (host port 8080).
server.port=8081

# --- Kafka (Phase 0) ---
# Broker from local/docker-compose.yml (the HOST listener). Nothing connects until
# something actually sends, so the test suite (no broker) stays green.
spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
# NoteCreated events go out as JSON. Boot 4 defaults to Jackson 3 (tools.jackson), so use
# spring-kafka's Jackson 3 serializer — the legacy JsonSerializer is Jackson 2 (com.fasterxml)
# and isn't on the classpath. Consumer is the (Python) classifier, so skip Java type headers.
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JacksonJsonSerializer
spring.kafka.producer.properties.spring.json.add.type.headers=false
