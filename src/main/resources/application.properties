spring.application.name=notes-api

# Default profile: H2 in-memory (zero setup, used by tests and quick runs).
# Flyway is OFF here because the migrations are PostgreSQL-specific; Hibernate
# builds the H2 schema from the entities instead. The 'postgres' profile
# (application-postgres.properties) switches to a real database with Flyway.
spring.flyway.enabled=false

# --- Kafka (Phase 0) ---
# Broker from local/docker-compose.yml (the HOST listener). Adding spring-kafka here
# creates a KafkaTemplate, but nothing connects until something actually sends — so the
# test suite (no broker) stays green. The smoke publisher is guarded by the 'smoke' profile.
spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.apache.kafka.common.serialization.StringSerializer
