# PostgreSQL profile.
# Activate with:  --spring.profiles.active=postgres   (or env SPRING_PROFILES_ACTIVE=postgres)

spring.datasource.url=jdbc:postgresql://localhost:5432/notesdb
spring.datasource.username=postgres
# Password is read from the POSTGRES_PASSWORD env var, falling back to 'postgres'
# for a local dev database. Never commit a real secret — externalize it.
spring.datasource.password=${POSTGRES_PASSWORD:postgres}

# Flyway owns the schema: it runs the versioned scripts in db/migration on startup
# and records what it has applied, so each migration runs exactly once.
spring.flyway.enabled=true

# Hibernate neither creates nor alters the schema here — it only VALIDATES that the
# entities line up with the tables Flyway created. This catches drift between your
# Java mappings and your database.
spring.jpa.hibernate.ddl-auto=validate
